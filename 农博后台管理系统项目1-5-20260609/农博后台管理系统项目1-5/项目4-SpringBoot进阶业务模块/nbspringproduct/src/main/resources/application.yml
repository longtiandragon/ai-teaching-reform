server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: nbspringproduct
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/nb_database?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  
  # 文件上传大小限制
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰转下划线
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键类型
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
  # Mapper XML文件位置
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类扫描包
  type-aliases-package: com.movie.nbspringproduct.entity

# 文件上传配置
file:
  upload:
    # 文件上传保存路径
    path: ./uploads
  access:
    # 文件访问路径前缀
    prefix: /uploads

# 日志配置
logging:
  level:
    com.movie.nbspringproduct: debug
    org.springframework: warn

